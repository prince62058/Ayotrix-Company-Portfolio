kind = "web"
previewPath = "/"
title = "Ayotrix - IT Company Website"
version = "1.0.0"
id = "artifacts/ayotrix"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 8080

[services.development]
run = "PORT=8080 pnpm --filter @workspace/ayotrix run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ayotrix", "run", "build" ]
publicDir = "artifacts/ayotrix/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "8080"
BASE_PATH = "/"
