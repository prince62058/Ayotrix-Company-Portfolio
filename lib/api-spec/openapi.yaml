openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Ayotrix IT Company API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: banners
    description: Hero banner management
  - name: services
    description: Services management
  - name: products
    description: Products management
  - name: team
    description: Team members management
  - name: testimonials
    description: Testimonials management
  - name: clients
    description: Clients/Partners management
  - name: contact
    description: Contact form
  - name: stats
    description: Company statistics
  - name: admin
    description: Admin authentication
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /banners:
    get:
      operationId: getBanners
      tags: [banners]
      summary: Get all active banners
      responses:
        "200":
          description: List of banners
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Banner"
    post:
      operationId: createBanner
      tags: [banners]
      summary: Create a banner (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BannerInput"
      responses:
        "201":
          description: Created banner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Banner"

  /banners/{id}:
    put:
      operationId: updateBanner
      tags: [banners]
      summary: Update banner (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BannerInput"
      responses:
        "200":
          description: Updated banner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Banner"
    delete:
      operationId: deleteBanner
      tags: [banners]
      summary: Delete banner (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /services:
    get:
      operationId: getServices
      tags: [services]
      summary: Get all services
      responses:
        "200":
          description: List of services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
    post:
      operationId: createService
      tags: [services]
      summary: Create service (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceInput"
      responses:
        "201":
          description: Created service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /services/{id}:
    get:
      operationId: getService
      tags: [services]
      summary: Get service by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Service detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
    put:
      operationId: updateService
      tags: [services]
      summary: Update service (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceInput"
      responses:
        "200":
          description: Updated service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
    delete:
      operationId: deleteService
      tags: [services]
      summary: Delete service (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /products:
    get:
      operationId: getProducts
      tags: [products]
      summary: Get all products
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create product (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update product (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete product (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /team:
    get:
      operationId: getTeamMembers
      tags: [team]
      summary: Get all team members
      responses:
        "200":
          description: List of team members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamMember"
    post:
      operationId: createTeamMember
      tags: [team]
      summary: Create team member (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamMemberInput"
      responses:
        "201":
          description: Created team member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"

  /team/{id}:
    put:
      operationId: updateTeamMember
      tags: [team]
      summary: Update team member (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamMemberInput"
      responses:
        "200":
          description: Updated team member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"
    delete:
      operationId: deleteTeamMember
      tags: [team]
      summary: Delete team member (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /testimonials:
    get:
      operationId: getTestimonials
      tags: [testimonials]
      summary: Get all testimonials
      responses:
        "200":
          description: List of testimonials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Testimonial"
    post:
      operationId: createTestimonial
      tags: [testimonials]
      summary: Create testimonial (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestimonialInput"
      responses:
        "201":
          description: Created testimonial
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Testimonial"

  /testimonials/{id}:
    put:
      operationId: updateTestimonial
      tags: [testimonials]
      summary: Update testimonial (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestimonialInput"
      responses:
        "200":
          description: Updated testimonial
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Testimonial"
    delete:
      operationId: deleteTestimonial
      tags: [testimonials]
      summary: Delete testimonial (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /clients:
    get:
      operationId: getClients
      tags: [clients]
      summary: Get all clients/partners
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create client (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientInput"
      responses:
        "201":
          description: Created client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    put:
      operationId: updateClient
      tags: [clients]
      summary: Update client (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientInput"
      responses:
        "200":
          description: Updated client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete client (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit contact form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactResult"
    get:
      operationId: getContacts
      tags: [contact]
      summary: Get all contact submissions (admin)
      responses:
        "200":
          description: List of contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contact"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get company statistics
      responses:
        "200":
          description: Company stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyStats"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResult"
        "401":
          description: Unauthorized

  /admin/logout:
    post:
      operationId: adminLogout
      tags: [admin]
      summary: Admin logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /admin/me:
    get:
      operationId: getAdminMe
      tags: [admin]
      summary: Get current admin session
      responses:
        "200":
          description: Admin info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMe"
        "401":
          description: Not authenticated

  /admin/change-password:
    post:
      operationId: adminChangePassword
      tags: [admin]
      summary: Change admin password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"
        "400":
          description: Wrong current password

  /admin/site-settings:
    get:
      operationId: getAdminSiteSettings
      tags: [admin]
      summary: Get site settings (admin)
      responses:
        "200":
          description: Site settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"
    put:
      operationId: updateAdminSiteSettings
      tags: [admin]
      summary: Update site settings (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteSettings"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /site-settings:
    get:
      operationId: getSiteSettings
      tags: [admin]
      summary: Get public site settings
      responses:
        "200":
          description: Site settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    DeleteResult:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    Banner:
      type: object
      required: [id, title, subtitle, ctaText, ctaLink, imageUrl, isActive, sortOrder]
      properties:
        id:
          type: string
        title:
          type: string
        subtitle:
          type: string
        ctaText:
          type: string
        ctaLink:
          type: string
        imageUrl:
          type: string
        isActive:
          type: boolean
        sortOrder:
          type: integer

    BannerInput:
      type: object
      required: [title, subtitle, ctaText, ctaLink, imageUrl]
      properties:
        title:
          type: string
        subtitle:
          type: string
        ctaText:
          type: string
        ctaLink:
          type: string
        imageUrl:
          type: string
        isActive:
          type: boolean
        sortOrder:
          type: integer

    Service:
      type: object
      required: [id, name, description, icon, features, isActive, sortOrder]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        icon:
          type: string
        features:
          type: array
          items:
            type: string
        isActive:
          type: boolean
        sortOrder:
          type: integer

    ServiceInput:
      type: object
      required: [name, description, icon, features]
      properties:
        name:
          type: string
        description:
          type: string
        icon:
          type: string
        features:
          type: array
          items:
            type: string
        isActive:
          type: boolean
        sortOrder:
          type: integer

    Product:
      type: object
      required: [id, name, description, imageUrl, category, isActive, sortOrder]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        imageUrl:
          type: string
        icon:
          type: string
        category:
          type: string
        isActive:
          type: boolean
        sortOrder:
          type: integer

    ProductInput:
      type: object
      required: [name, description, imageUrl, category]
      properties:
        name:
          type: string
        description:
          type: string
        imageUrl:
          type: string
        icon:
          type: string
        category:
          type: string
        isActive:
          type: boolean
        sortOrder:
          type: integer

    TeamMember:
      type: object
      required: [id, name, role, bio, imageUrl, isActive, sortOrder]
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
        bio:
          type: string
        imageUrl:
          type: string
        isActive:
          type: boolean
        sortOrder:
          type: integer

    TeamMemberInput:
      type: object
      required: [name, role, bio, imageUrl]
      properties:
        name:
          type: string
        role:
          type: string
        bio:
          type: string
        imageUrl:
          type: string
        isActive:
          type: boolean
        sortOrder:
          type: integer

    Testimonial:
      type: object
      required: [id, clientName, company, review, rating, isActive]
      properties:
        id:
          type: string
        clientName:
          type: string
        company:
          type: string
        review:
          type: string
        rating:
          type: integer
        imageUrl:
          type: ["string", "null"]
        isActive:
          type: boolean

    TestimonialInput:
      type: object
      required: [clientName, company, review, rating]
      properties:
        clientName:
          type: string
        company:
          type: string
        review:
          type: string
        rating:
          type: integer
        imageUrl:
          type: ["string", "null"]
        isActive:
          type: boolean

    Client:
      type: object
      required: [id, name, logoUrl, isActive]
      properties:
        id:
          type: string
        name:
          type: string
        logoUrl:
          type: string
        isActive:
          type: boolean

    ClientInput:
      type: object
      required: [name, logoUrl]
      properties:
        name:
          type: string
        logoUrl:
          type: string
        isActive:
          type: boolean

    ContactInput:
      type: object
      required: [name, email, phone, message]
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        subject:
          type: ["string", "null"]
        message:
          type: string

    ContactResult:
      type: object
      required: [success, id]
      properties:
        success:
          type: boolean
        id:
          type: string

    Contact:
      type: object
      required: [id, name, email, phone, message, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        subject:
          type: ["string", "null"]
        message:
          type: string
        createdAt:
          type: string

    CompanyStats:
      type: object
      required: [projectsCompleted, happyClients, yearsExperience, teamMembers]
      properties:
        projectsCompleted:
          type: integer
        happyClients:
          type: integer
        yearsExperience:
          type: integer
        teamMembers:
          type: integer

    AdminLoginInput:
      type: object
      required: [password]
      properties:
        username:
          type: string
        password:
          type: string

    AdminLoginResult:
      type: object
      required: [success, username]
      properties:
        success:
          type: boolean
        username:
          type: string

    AdminMe:
      type: object
      required: [username, isAuthenticated]
      properties:
        username:
          type: string
        isAuthenticated:
          type: boolean

    ChangePasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string

    SiteSettings:
      type: object
      properties:
        logoUrl:
          type: string
        companyName:
          type: string
        contactPerson:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string
